name: Generate Social Media Copy

on:
  push:
    branches: [main]
    paths:
      - 'posts/**.md'
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Post file path (e.g. posts/2026-03-27-two-days-of-shipping.md)'
        required: true

permissions:
  contents: read

jobs:
  generate-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog posts
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.post_file }}" ]; then
            POST_FILE="${{ github.event.inputs.post_file }}"
            if [ ! -f "$POST_FILE" ]; then
              echo "::error::File not found: $POST_FILE"
              exit 1
            fi
          else
            POST_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' | head -1)
            if [ -z "$POST_FILE" ]; then
              echo "No new posts found"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "file=$POST_FILE" >> "$GITHUB_OUTPUT"
          echo "Processing: $POST_FILE"

      - name: Generate social copy with Gemini
        if: steps.detect.outputs.found == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POST_FILE: ${{ steps.detect.outputs.file }}
        run: python3 .github/scripts/generate-social-copy.py

      - name: Push drafts to Buffer
        if: steps.detect.outputs.found == 'true'
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}
        run: python3 .github/scripts/push-to-buffer.py
