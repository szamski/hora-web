<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Command key — Google Calendar-style keyboard shortcuts">
  <defs>
    <linearGradient id="kStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF383C" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FF5156" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF7370" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="kFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF383C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF7370" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="kOuterGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glyphGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Outer soft glow -->
  <g opacity="0.85" filter="url(#kOuterGlow)">
    <rect x="130" y="130" width="340" height="340" rx="56"
          fill="none" stroke="url(#kStroke)" stroke-width="8"/>
  </g>

  <!-- Keycap body -->
  <rect x="130" y="130" width="340" height="340" rx="56"
        fill="url(#kFill)" stroke="url(#kStroke)" stroke-width="3"/>

  <!-- Inner dashed outline -->
  <rect x="160" y="160" width="280" height="280" rx="40"
        fill="none" stroke="#FF383C" stroke-width="1.25" stroke-opacity="0.35" stroke-dasharray="7 10"/>

  <!-- ⌘ glyph rendered via system font (SF Pro on Mac, fallback elsewhere) -->
  <text x="300" y="300"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI Symbol', system-ui, sans-serif"
        font-size="230"
        font-weight="400"
        text-anchor="middle"
        dominant-baseline="central"
        fill="#FFFFFF"
        opacity="0.55"
        filter="url(#glyphGlow)">⌘</text>
  <text x="300" y="300"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI Symbol', system-ui, sans-serif"
        font-size="230"
        font-weight="400"
        text-anchor="middle"
        dominant-baseline="central"
        fill="#FFFFFF">⌘</text>
</svg>
