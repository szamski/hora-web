<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Privacy shield — your data stays between your Mac and Google, with nothing in between">
  <defs>
    <linearGradient id="shieldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF383C" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FF5156" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF7370" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF383C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF7370" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="checkFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE5E5"/>
    </linearGradient>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Outer soft glow (duplicated shape, blurred) -->
  <g opacity="0.85">
    <path d="M300 40 L520 130 L520 320 Q520 470 300 560 Q80 470 80 320 L80 130 Z"
          fill="none" stroke="url(#shieldStroke)" stroke-width="8" filter="url(#outerGlow)"/>
  </g>

  <!-- Main shield body -->
  <path d="M300 40 L520 130 L520 320 Q520 470 300 560 Q80 470 80 320 L80 130 Z"
        fill="url(#shieldFill)" stroke="url(#shieldStroke)" stroke-width="3"/>

  <!-- Inner dashed outline -->
  <path d="M300 78 L485 154 L485 317 Q485 450 300 524 Q115 450 115 317 L115 154 Z"
        fill="none" stroke="#FF383C" stroke-width="1.25" stroke-opacity="0.35" stroke-dasharray="7 10"/>

  <!-- Checkmark (centered) -->
  <g filter="url(#innerGlow)">
    <path d="M220 295 L280 355 L395 235"
          fill="none" stroke="url(#checkFill)" stroke-width="22"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M220 295 L280 355 L395 235"
        fill="none" stroke="url(#checkFill)" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
